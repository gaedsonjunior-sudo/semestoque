<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sem Estoque</title>

  <style>
    body { font-family: Arial, sans-serif; margin: 10px; }
    .tab { display: none; }
    .tab.active { display: block; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 5px; text-align: center; }
    button { margin: 2px; }
  </style>
</head>
<body>

<h2>Sem Estoque</h2>

<button onclick="showTab('cadastro')">Cadastrar</button>
<button onclick="showTab('visualizar')">Visualizar</button>

<hr>

<!-- ABA CADASTRO -->
<div id="cadastro" class="tab active">
  <input id="fiscal" placeholder="Fiscal"><br><br>
  <input id="setor" placeholder="Setor"><br><br>
  <input id="codigo" placeholder="Código de barras">
  <button onclick="iniciarScanner()">📷 Scanner</button><br><br>
  <input id="quantidade" placeholder="Quantidade"><br><br>
  <input id="foto" type="file" accept="image/*"><br><br>

  <button onclick="enviar()">Enviar</button>
</div>

<!-- ABA VISUALIZAR -->
<div id="visualizar" class="tab">
  <table>
    <thead>
      <tr>
        <th>Fiscal</th>
        <th>Setor</th>
        <th>Código</th>
        <th>Qtd</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="lista"></tbody>
  </table>
</div>

<!-- MODAL SCANNER -->
<div id="scannerModal" style="
  display:none;
  position:fixed;
  inset:0;
  background:#000;
  z-index:9999;
">
  <video id="scannerVideo" style="width:100%;height:100%;object-fit:cover"></video>

  <button onclick="fecharScanner()" style="
    position:absolute;
    top:20px;
    right:20px;
    font-size:18px;
    padding:10px;
  ">✖</button>
</div>

<!-- SCRIPTS -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>

<script src="./supabase-config.js"></script>
<script src="./app.js"></script>
<script src="./barcode_scanner.js"></script>

</body>
</html>
